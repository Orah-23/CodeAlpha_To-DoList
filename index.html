<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="Styles/style.css">
</head>
<body>

    <!-- ── Main View ── -->
    <div class="container" id="mainView">
        <header class="app-header">
            <div class="header-top">
                <div>
                    <h1>My Tasks</h1>
                    <p class="subtitle" id="taskCount">0 tasks remaining</p>
                </div>
                <button class="plus-btn" onclick="showAddPanel()" aria-label="Add new task" title="Add new task">
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                        <path d="M9 3v12M3 9h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>
        </header>

        <div class="search-row">
            <svg class="search-icon" width="15" height="15" viewBox="0 0 15 15" fill="none">
                <circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.2"/>
                <path d="M10.5 10.5L13.5 13.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
            </svg>
            <input type="text" id="txtTask" placeholder="Search tasks..." oninput="renderTasks()">
        </div>

        <div class="filter-row">
            <button class="filter-btn active" data-filter="all" onclick="setFilter(this, 'all')">All</button>
            <button class="filter-btn" data-filter="active" onclick="setFilter(this, 'active')">Active</button>
            <button class="filter-btn" data-filter="completed" onclick="setFilter(this, 'completed')">Completed</button>
        </div>

        <ul class="task-list" id="liTasks">
            <li class="empty-state" id="empState">
                <span class="empty-icon">✓</span>
                <p>No tasks yet. Press + to add one!</p>
            </li>
        </ul>

        <div class="list-footer" id="liFooter" style="display:none;">
            <span id="completedCount">0 completed</span>
            <button class="clear-btn" onclick="clearCompleted()">Clear completed</button>
        </div>
    </div>

    <!-- ── Add / Edit Task Panel ── -->
    <div class="panel-overlay" id="taskPanel" onclick="handleOverlayClick(event)">
        <div class="panel-card" id="panelCard">
            <div class="panel-header">
                <h2 id="panelTitle">New Task</h2>
                <button class="panel-close" onclick="hidePanel()" aria-label="Close">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path d="M2 2l12 12M14 2L2 14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>

            <div class="panel-body">
                <div class="field-group">
                    <label for="task-name">Task name</label>
                    <input type="text" id="txtName" placeholder="e.g. Review project proposal" maxlength="120">
                    <span class="field-error" id="nameError"></span>
                </div>

                <div class="field-group">
                    <label for="task-desc">Description</label>
                    <textarea id="txtDesc" placeholder="Add more detail about this task..." maxlength="400" rows="4" oninput="updateCharCount()"></textarea>
                    <span class="char-count" id="descCount">0 / 400</span>
                </div>
            </div>

            <div class="panel-actions">
                <button class="btn-discard" onclick="hidePanel()">Discard</button>
                <button class="btn-save" onclick="saveTask()">Save</button>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2026 - F.O. Kgatlhanye. All rights reserved.</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
